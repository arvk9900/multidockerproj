version: '3.8'

services:

  backend:
    build: ./backend
    container_name: backend_app

    # REMOVE PUBLIC PORT
    # Backend now internal only

    env_file:
      - .env

    depends_on:
      - mongo

    networks:
      - app_network


  frontend:
    build: ./frontend
    container_name: frontend_app

    # REMOVE PUBLIC PORT
    # Frontend accessed through Nginx

    depends_on:
      - backend

    networks:
      - app_network


  mongo:
    image: mongo
    container_name: mongo_db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - app_network


  # =========================
  # NEW NGINX SERVICE
  # =========================

  nginx:
    image: nginx:latest
    container_name: nginx_proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    networks:
      - app_network


volumes:
  mongo_data:


networks:
  app_network: